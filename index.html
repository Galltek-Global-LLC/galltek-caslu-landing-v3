    <!-- Sparkle Tracker Script v2.5 (Operações + FBP + Anti-Cache) -->
    <script>
      (function() {
        function getCookie(name) {
          var value = "; " + document.cookie;
          var parts = value.split("; " + name + "=");
          if (parts.length == 2) return parts.pop().split(";").shift();
        }

        function preserveParams() {
          const currentUrlParams = new URLSearchParams(window.location.search);
          const fbpCookie = getCookie('_fbp');
          const fbcCookie = getCookie('_fbc');

          if (fbpCookie && !currentUrlParams.has('fbp')) currentUrlParams.set('fbp', fbpCookie);
          if (fbcCookie && !currentUrlParams.has('fbc')) currentUrlParams.set('fbc', fbcCookie);

          document.querySelectorAll('a').forEach(function(link) {
            const href = link.href;
            var isSparkle =
              link.classList.contains('sparkle-track') ||
              href.indexOf('/re?') !== -1 ||
              href.indexOf('/r?') !== -1 ||
              href.indexOf('/#/re?') !== -1 ||
              href.indexOf('/re/op/') !== -1;
            if (!isSparkle) return;
            try {
              var url = new URL(href);
              currentUrlParams.forEach(function(val, key) {
                if (!url.searchParams.has(key)) url.searchParams.set(key, val);
              });
              link.href = url.toString();
            } catch (e) { console.error('Erro Sparkle Script:', e); }
          });
        }

        window.addEventListener('DOMContentLoaded', preserveParams);
        setTimeout(preserveParams, 500);
        setTimeout(preserveParams, 2000);
      })();
    </script>
